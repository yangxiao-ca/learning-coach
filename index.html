<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 学习教练</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        .window-content { font-size: 14px; line-height: 1.6; }
        .window-content h1, .window-content h2, .window-content h3 { font-weight: bold; margin-top: 1em; margin-bottom: 0.5em; }
        .window-content h1 { font-size: 1.5em; }
        .window-content h2 { font-size: 1.3em; }
        .window-content h3 { font-size: 1.1em; }
        .window-content ul, .window-content ol { margin-left: 1.5em; margin-bottom: 0.5em; }
        .window-content p { margin-bottom: 0.5em; }
        .window-content code { background: #1e293b; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
        .window-content pre { background: #1e293b; padding: 12px; border-radius: 6px; overflow-x: auto; margin: 8px 0; }
        .window-content pre code { background: transparent; padding: 0; }
        .phase-step { transition: all 0.3s ease; }
        .phase-step.completed { background: #065f46; }
        .phase-step.current { background: #1e40af; ring: 2px solid #60a5fa; }
        .phase-step.skipped { opacity: 0.5; }
        .loading { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .modal { display: none; }
        .modal.active { display: flex; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">
    <div id="app" class="container mx-auto p-4 max-w-7xl">
        <!-- Header -->
        <header class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-indigo-400">🎓 AI 学习教练</h1>
            <div class="flex gap-2">
                <button onclick="showApiSettings()" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm">
                    ⚙️ 设置 API
                </button>
            </div>
        </header>

        <!-- 主视图：项目列表 -->
        <div id="mainView">
            <!-- 快速操作 -->
            <div class="mb-6">
                <button onclick="showNewProjectModal()" class="px-6 py-3 bg-indigo-600 hover:bg-indigo-700 rounded-lg font-bold text-lg">
                    + 新建学习项目
                </button>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <!-- 左侧：我的学习项目 -->
                <div class="lg:col-span-2">
                    <h2 class="text-lg font-semibold mb-4 text-slate-300">📚 我的学习项目</h2>
                    <div id="projectList" class="space-y-3">
                        <!-- 项目列表动态生成 -->
                        <div class="text-slate-500 text-center py-8">
                            还没有学习项目，点击上方按钮创建第一个项目吧！
                        </div>
                    </div>
                </div>

                <!-- 右侧：今日学习 -->
                <div class="lg:col-span-1">
                    <h2 class="text-lg font-semibold mb-4 text-slate-300">📖 今日学习</h2>
                    <div id="todayLearning" class="bg-slate-800 rounded-lg p-4">
                        <div class="text-slate-500 text-center py-8">
                            今天还没有学习记录
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 学习视图：七步流程 -->
        <div id="learningView" class="hidden">
            <!-- 将在学习时动态填充 -->
        </div>

        <!-- 设置 API 模态框 -->
        <div id="apiSettingsModal" class="modal fixed inset-0 bg-black/50 z-50 items-center justify-center">
            <div class="bg-slate-800 rounded-xl p-6 w-full max-w-lg mx-4 max-h-[80vh] overflow-y-auto">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold">API 设置</h2>
                    <button onclick="hideApiSettings()" class="text-slate-400 hover:text-white text-2xl">&times;</button>
                </div>
                <div class="space-y-3">
                    <!-- 国际模型 -->
                    <div class="text-xs text-slate-500 font-bold uppercase pt-2">国际模型</div>
                    <div>
                        <label class="block text-sm text-slate-400 mb-1">OpenAI API Key (GPT-4o)</label>
                        <input id="openaiKey" type="password" class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 text-sm" placeholder="sk-...">
                    </div>
                    <div>
                        <label class="block text-sm text-slate-400 mb-1">Anthropic API Key (Claude)</label>
                        <input id="anthropicKey" type="password" class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 text-sm" placeholder="sk-ant-...">
                    </div>
                    <div>
                        <label class="block text-sm text-slate-400 mb-1">Google API Key (Gemini)</label>
                        <input id="googleKey" type="password" class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 text-sm" placeholder="AIza...">
                    </div>

                    <!-- 国内模型 -->
                    <div class="text-xs text-slate-500 font-bold uppercase pt-2">国内模型</div>
                    <div>
                        <label class="block text-sm text-slate-400 mb-1">千问 API Key (阿里云 DashScope)</label>
                        <input id="qwenKey" type="password" class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 text-sm" placeholder="sk-...">
                    </div>
                    <div>
                        <label class="block text-sm text-slate-400 mb-1">Kimi API Key (月之暗面)</label>
                        <input id="kimiKey" type="password" class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 text-sm" placeholder="sk-...">
                    </div>
                    <div>
                        <label class="block text-sm text-slate-400 mb-1">MiniMax API Key</label>
                        <input id="minimaxKey" type="password" class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 text-sm" placeholder="...">
                    </div>
                    <div>
                        <label class="block text-sm text-slate-400 mb-1">MiniMax Group ID</label>
                        <input id="minimaxGroupId" type="text" class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 text-sm" placeholder="可选...">
                    </div>
                    <div>
                        <label class="block text-sm text-slate-400 mb-1">智谱 API Key (GLM)</label>
                        <input id="zhipuKey" type="password" class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 text-sm" placeholder="...">
                    </div>

                    <div>
                        <label class="block text-sm text-slate-400 mb-1">默认模型</label>
                        <select id="defaultModel" class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 text-sm">
                            <option value="claude-3-5-sonnet">Claude 3.5 Sonnet</option>
                            <option value="gpt-4o">GPT-4o</option>
                            <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
                            <option value="qwen-max">千问 Qwen Max</option>
                            <option value="kimi-moonshot-v1-128k">Kimi 128K</option>
                            <option value="minimax-abab6.5s-chat">MiniMax ABAB6.5s</option>
                            <option value="glm-4">智谱 GLM-4</option>
                        </select>
                    </div>

                    <button onclick="saveApiSettings()" class="w-full py-2 bg-indigo-600 hover:bg-indigo-700 rounded-lg font-bold mt-4">
                        保存
                    </button>
                </div>
            </div>
        </div>

        <!-- 新建项目模态框 -->
        <div id="newProjectModal" class="modal fixed inset-0 bg-black/50 z-50 items-center justify-center">
            <div class="bg-slate-800 rounded-xl p-6 w-full max-w-2xl mx-4 max-h-[80vh] overflow-y-auto">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold">📚 新建学习项目</h2>
                    <button onclick="hideNewProjectModal()" class="text-slate-400 hover:text-white text-2xl">&times;</button>
                </div>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm text-slate-400 mb-1">学习主题</label>
                        <input id="projectTitle" type="text" class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 text-sm" placeholder="例如：深度学习原理与实践">
                    </div>

                    <div>
                        <label class="block text-sm text-slate-400 mb-1">学习材料来源</label>
                        <div class="flex gap-2 mb-2">
                            <button onclick="setMaterialInput('paste')" id="btnPaste" class="flex-1 py-2 bg-indigo-600 rounded text-sm">粘贴文本</button>
                            <button onclick="setMaterialInput('pdf')" id="btnPdf" class="flex-1 py-2 bg-slate-700 hover:bg-slate-600 rounded text-sm">上传 PDF</button>
                            <button onclick="setMaterialInput('txt')" id="btnTxt" class="flex-1 py-2 bg-slate-700 hover:bg-slate-600 rounded text-sm">上传 TXT</button>
                        </div>
                    </div>

                    <!-- 粘贴文本模式 -->
                    <div id="pasteInputArea">
                        <label class="block text-sm text-slate-400 mb-1">学习材料（粘贴文章、博客内容）</label>
                        <textarea id="materialContent" class="w-full h-40 bg-slate-700 border border-slate-600 rounded px-3 py-2 text-sm resize-none" placeholder="粘贴学习材料..."></textarea>
                    </div>

                    <!-- PDF 上传模式 -->
                    <div id="pdfInputArea" class="hidden">
                        <label class="block text-sm text-slate-400 mb-1">上传 PDF 文件</label>
                        <input type="file" id="pdfFileInput" accept=".pdf" class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 text-sm" onchange="handlePdfUpload(this)">
                        <div id="pdfPreview" class="mt-2 text-sm text-slate-500 hidden">
                            <div class="bg-slate-900 rounded p-3">
                                <div class="flex items-center gap-2 mb-2">
                                    <span class="text-green-400">✅</span>
                                    <span id="pdfFileName">文件名</span>
                                </div>
                                <div id="pdfChapters" class="text-xs space-y-1"></div>
                                <p class="text-amber-400 mt-2">💡 将按章节生成学习步骤，节省约 95% Token</p>
                            </div>
                        </div>
                    </div>

                    <!-- TXT 上传模式 -->
                    <div id="txtInputArea" class="hidden">
                        <label class="block text-sm text-slate-400 mb-1">上传 TXT/MD 文件</label>
                        <input type="file" id="txtFileInput" accept=".txt,.md" class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 text-sm" onchange="handleTxtUpload(this)">
                    </div>

                    <div>
                        <label class="block text-sm text-slate-400 mb-1">学习目标（可选）</label>
                        <input id="learningGoal" type="text" class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 text-sm" placeholder="例如：理解核心原理，能搭建简单模型">
                    </div>

                    <div>
                        <label class="block text-sm text-slate-400 mb-1">学习者画像（可选）</label>
                        <input id="learnerProfile" type="text" class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 text-sm" placeholder="例如：初学者，工科背景，希望结合代码示例">
                    </div>

                    <div>
                        <label class="block text-sm text-slate-400 mb-1">选择 AI 模型</label>
                        <select id="projectModel" class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 text-sm">
                            <option value="claude-3-5-sonnet">Claude 3.5 Sonnet（推荐）</option>
                            <option value="gpt-4o">GPT-4o</option>
                            <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
                            <option value="qwen-max">千问 Qwen Max</option>
                            <option value="kimi-moonshot-v1-128k">Kimi 128K</option>
                            <option value="minimax-abab6.5s-chat">MiniMax ABAB6.5s</option>
                            <option value="glm-4">智谱 GLM-4</option>
                        </select>
                    </div>

                    <div class="flex gap-2 mt-4">
                        <button onclick="saveProjectOnly()" class="flex-1 py-3 bg-slate-600 hover:bg-slate-500 rounded-lg font-bold">
                            💾 保存项目
                        </button>
                        <button onclick="createProject()" id="btnCreateProject" class="flex-1 py-3 bg-indigo-600 hover:bg-indigo-700 rounded-lg font-bold">
                            🚀 生成学习规划
                        </button>
                    </div>

                    <!-- 生成进度 -->
                    <div id="generatingProgress" class="hidden mt-4 p-4 bg-slate-900 rounded-lg">
                        <div class="flex items-center gap-3 mb-3">
                            <div class="loading text-2xl">🤖</div>
                            <div>
                                <p class="font-semibold" id="progressText">正在分析学习材料...</p>
                                <p class="text-xs text-slate-500" id="progressSubtext">这可能需要 10-30 秒</p>
                            </div>
                        </div>
                        <div class="w-full bg-slate-700 rounded-full h-3">
                            <div id="progressBar" class="bg-indigo-600 h-3 rounded-full transition-all duration-500" style="width: 0%"></div>
                        </div>
                        <p class="text-xs text-slate-500 mt-2 text-center" id="progressPercent">0%</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== 数据库 (IndexedDB) ====================
        const DB_NAME = 'LearningCoachDB';
        const DB_VERSION = 1;
        let db = null;

        async function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);

                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    db = request.result;
                    resolve(db);
                };

                request.onupgradeneeded = (event) => {
                    const database = event.target.result;

                    // 项目表
                    if (!database.objectStoreNames.contains('projects')) {
                        const projectStore = database.createObjectStore('projects', { keyPath: 'id' });
                        projectStore.createIndex('createdAt', 'createdAt', { unique: false });
                    }

                    // 学习记录表
                    if (!database.objectStoreNames.contains('records')) {
                        const recordStore = database.createObjectStore('records', { keyPath: 'id' });
                        recordStore.createIndex('projectId', 'projectId', { unique: false });
                        recordStore.createIndex('date', 'date', { unique: false });
                    }
                };
            });
        }

        async function dbAdd(storeName, data) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(storeName, 'readwrite');
                const store = transaction.objectStore(storeName);
                const request = store.add(data);
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        async function dbGet(storeName, id) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(storeName, 'readonly');
                const store = transaction.objectStore(storeName);
                const request = store.get(id);
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        async function dbGetAll(storeName) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(storeName, 'readonly');
                const store = transaction.objectStore(storeName);
                const request = store.getAll();
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        async function dbUpdate(storeName, data) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(storeName, 'readwrite');
                const store = transaction.objectStore(storeName);
                const request = store.put(data);
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        async function dbDelete(storeName, id) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(storeName, 'readwrite');
                const store = transaction.objectStore(storeName);
                const request = store.delete(id);
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }

        // ==================== 模型配置 ====================
        const MODELS = {
            // OpenAI
            'gpt-4o': { name: 'GPT-4o', provider: 'openai', endpoint: 'https://api.openai.com/v1/chat/completions' },
            'gpt-4o-mini': { name: 'GPT-4o Mini', provider: 'openai', endpoint: 'https://api.openai.com/v1/chat/completions' },
            'o3-mini': { name: 'O3 Mini', provider: 'openai', endpoint: 'https://api.openai.com/v1/chat/completions' },
            // Anthropic
            'claude-3-5-sonnet': { name: 'Claude 3.5 Sonnet', provider: 'anthropic', endpoint: 'https://api.anthropic.com/v1/messages' },
            'claude-3-haiku': { name: 'Claude 3 Haiku', provider: 'anthropic', endpoint: 'https://api.anthropic.com/v1/messages' },
            // Google
            'gemini-2.5-flash': { name: 'Gemini 2.5 Flash', provider: 'google', endpoint: 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent' },
            'gemini-2.5-pro': { name: 'Gemini 2.5 Pro', provider: 'google', endpoint: 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-pro:generateContent' },
            // 千问
            'qwen-max': { name: 'Qwen Max', provider: 'qwen', endpoint: 'https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions' },
            'qwen-plus': { name: 'Qwen Plus', provider: 'qwen', endpoint: 'https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions' },
            // Kimi
            'kimi-moonshot-v1-128k': { name: 'Kimi 128K', provider: 'kimi', endpoint: 'https://api.moonshot.cn/v1/chat/completions' },
            // MiniMax
            'minimax-abab6.5s-chat': { name: 'MiniMax ABAB6.5s', provider: 'minimax', endpoint: 'https://api.minimax.chat/v1/text/chatcompletion_v2' },
            // 智谱
            'glm-4': { name: '智谱 GLM-4', provider: 'zhipu', endpoint: 'https://open.bigmodel.cn/api/paas/v4/chat/completions' },
        };

        const MODEL_NAME_MAP = {
            'GPT-4o': 'gpt-4o',
            'GPT-4o Mini': 'gpt-4o-mini',
            'O3 Mini': 'o3-mini',
            'Claude 3.5 Sonnet': 'claude-3-5-sonnet-20241022',
            'Claude 3 Haiku': 'claude-3-5-haiku-20241022',
            'Gemini 2.5 Flash': 'gemini-2.5-flash',
            'Gemini 2.5 Pro': 'gemini-2.5-pro',
            'Qwen Max': 'qwen-max',
            'Qwen Plus': 'qwen-plus',
            'Kimi 128K': 'moonshot-v1-128k',
            'MiniMax ABAB6.5s': 'abab6.5s-chat',
            '智谱 GLM-4': 'glm-4',
        };

        // ==================== AI 调用 ====================
        async function callModel(modelId, messages, options = {}) {
            const model = MODELS[modelId];
            if (!model) throw new Error('未知模型: ' + modelId);

            const settings = getApiSettings();
            const apiKey = settings[`${model.provider}Key`];
            if (!apiKey) throw new Error(`未配置 ${model.provider} API Key`);

            switch (model.provider) {
                case 'openai':
                    return await callOpenAI(model, messages, apiKey, options);
                case 'anthropic':
                    return await callAnthropic(model, messages, apiKey, options);
                case 'google':
                    return await callGoogle(model, messages, apiKey, options);
                case 'qwen':
                    return await callQwen(model, messages, apiKey, options);
                case 'kimi':
                    return await callKimi(model, messages, apiKey, options);
                case 'minimax':
                    return await callMinimax(model, messages, apiKey, settings.minimaxGroupId, options);
                case 'zhipu':
                    return await callZhipu(model, messages, apiKey, options);
                default:
                    throw new Error('不支持的提供商: ' + model.provider);
            }
        }

        async function callOpenAI(model, messages, apiKey, options) {
            const response = await fetch(model.endpoint, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: MODEL_NAME_MAP[model.name],
                    messages: messages,
                    max_tokens: options.maxTokens || 4096
                })
            });

            if (!response.ok) {
                const err = await response.json();
                throw new Error(err.error?.message || 'API 请求失败');
            }

            const data = await response.json();
            return { content: data.choices[0].message.content, usage: data.usage };
        }

        async function callAnthropic(model, messages, apiKey, options) {
            const response = await fetch(model.endpoint, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-api-key': apiKey,
                    'anthropic-version': '2023-06-01'
                },
                body: JSON.stringify({
                    model: MODEL_NAME_MAP[model.name],
                    max_tokens: options.maxTokens || 4096,
                    messages: messages
                })
            });

            if (!response.ok) {
                const err = await response.json();
                throw new Error(err.error?.message || 'API 请求失败');
            }

            const data = await response.json();
            return { content: data.content[0].text, usage: data.usage };
        }

        async function callGoogle(model, messages, apiKey, options) {
            const userMessage = messages.find(m => m.role === 'user')?.content || '';
            const response = await fetch(`${model.endpoint}?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: userMessage }] }],
                    generationConfig: { maxOutputTokens: options.maxTokens || 4096 }
                })
            });

            if (!response.ok) {
                const err = await response.json();
                throw new Error(err.error?.message || 'API 请求失败');
            }

            const data = await response.json();
            return { content: data.candidates[0].content.parts[0].text, usage: data.usageMetadata };
        }

        async function callQwen(model, messages, apiKey, options) {
            const response = await fetch(model.endpoint, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: MODEL_NAME_MAP[model.name],
                    messages: messages,
                    max_tokens: options.maxTokens || 4096
                })
            });

            if (!response.ok) {
                const err = await response.json();
                throw new Error(err.error?.message || err.message || 'API 请求失败');
            }

            const data = await response.json();
            return { content: data.choices[0].message.content, usage: data.usage };
        }

        async function callKimi(model, messages, apiKey, options) {
            const response = await fetch(model.endpoint, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: MODEL_NAME_MAP[model.name],
                    messages: messages,
                    max_tokens: options.maxTokens || 4096
                })
            });

            if (!response.ok) {
                const err = await response.json();
                throw new Error(err.error?.message || err.message || 'API 请求失败');
            }

            const data = await response.json();
            return { content: data.choices[0].message.content, usage: data.usage };
        }

        async function callMinimax(model, messages, apiKey, groupId, options) {
            const requestBody = {
                model: MODEL_NAME_MAP[model.name],
                messages: messages,
                tokens_to_generate: options.maxTokens || 4096
            };

            if (groupId) {
                requestBody.group_id = groupId;
            }

            const response = await fetch(model.endpoint, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify(requestBody)
            });

            if (!response.ok) {
                const err = await response.json();
                throw new Error(err.error?.message || 'API 请求失败');
            }

            const data = await response.json();
            return { content: data.choices[0].messages[0].text, usage: data.usage };
        }

                },

                })
            });

            if (!response.ok) {

        async function handlePdfUpload(input) {
            const file = input.files[0];
            if (!file) return;

            const fileName = file.name;
            document.getElementById('pdfFileName').textContent = fileName;

            try {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;

                let fullText = '';
                let chapterCount = 0;
                const chapters = [];

                // 简单的章节检测：查找"第X章"模式
                const chapterPattern = /第[一二三四五六七八九十百千0-9]+章/g;

                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    const pageText = textContent.items.map(item => item.str).join(' ');
                    fullText += pageText + '\n\n';

                    // 检测章节
                    const matches = pageText.match(chapterPattern);
                    if (matches) {
                        chapterCount++;
                        chapters.push({
                            page: i,
                            title: matches[0],
                            preview: pageText.substring(0, 100)
                        });
                    }
                }

                // 存储解析结果
                uploadedPdfData = {
                    type: 'pdf',
                    title: fileName,
                    fileName: fileName,
                    fullText: fullText,
                    preview: fullText.substring(0, 3000), // 前3000字用于生成大纲
                    chapters: chapters,
                    totalPages: pdf.numPages
                };

                // 显示预览
                const chaptersDiv = document.getElementById('pdfChapters');
                chaptersDiv.innerHTML = `
                    <p class="text-green-400">✅ 已解析: ${pdf.numPages} 页，约 ${Math.ceil(fullText.length / 1000)} 千字</p>
                    <p class="text-slate-400 mt-2">检测到 ${chapters.length} 个章节：</p>
                    <div class="mt-2 space-y-1 max-h-32 overflow-y-auto">
                        ${chapters.slice(0, 10).map(c => `
                            <div class="flex items-center gap-2 text-xs">
                                <span class="text-indigo-400">•</span>
                                <span>${c.title}</span>
                                <span class="text-slate-500">(${c.preview.substring(0, 30)}...)</span>
                            </div>
                        `).join('')}
                        ${chapters.length > 10 ? `<p class="text-slate-500">... 还有 ${chapters.length - 10} 个章节</p>` : ''}
                    </div>
                `;

                document.getElementById('pdfPreview').classList.remove('hidden');

            } catch (error) {
                alert('PDF 解析失败: ' + error.message);
                console.error(error);
            }
        }

            progressBar.style.width = currentProgress + '%';

        function getTimeAgo(date) {
            const seconds = Math.floor((new Date() - date) / 1000);
            if (seconds < 60) return '刚刚';
            if (seconds < 3600) return Math.floor(seconds / 60) + '分钟前';
            if (seconds < 86400) return Math.floor(seconds / 3600) + '小时前';
            if (seconds < 604800) return Math.floor(seconds / 86400) + '天前';
            return date.toLocaleDateString('zh-CN');
        }

                project.currentStep = 1;
                project.currentPhase = 1;
                project.updatedAt = new Date().toISOString();

                await dbUpdate('projects', project);

                renderProjectList();

                // 提示用户规划已生成
                const projectCard = listEl.querySelector(`[onclick*="'${projectId}'"]`);
                if (projectCard) {
                    projectCard.classList.add('ring-2', 'ring-green-500');
                    setTimeout(() => projectCard.classList.remove('ring-2', 'ring-green-500'), 2000);
                }

            } catch (error) {
                alert('生成学习规划失败: ' + error.message);
                listEl.innerHTML = originalContent;
                console.error(error);
            }
        }

        async function openProject(projectId) {
            const project = await dbGet('projects', projectId);
            if (project) {
                // 检查是否已生成学习规划
                if (!project.planGenerated || !project.plan) {
                    alert('请先生成学习规划后再开始学习');
                    return;
                }
                currentProject = project;

                // 加载已保存的确认内容
                await loadPhaseConfirmedContents();

                console.log('打开项目，确认内容:', phaseConfirmedContents);

                renderLearningView();
            }
        }

            const project = await dbGet('projects', projectId);
            if (!project) return;

            // 检查是否已生成学习规划
            if (!project.planGenerated || !project.plan) {
                if (confirm(`项目"${project.title}"还没有生成学习规划。\n\n现在生成吗？`)) {
                    await generatePlanForProject(projectId);

                return;
            }

            await openProject(projectId);

            // TODO: 实现继续学习逻辑
        }

        async function deleteProject(projectId) {
            const project = await dbGet('projects', projectId);
            if (!project) return;

            if (!confirm(`确定要删除项目"${project.title}"吗？\n\n此操作不可恢复，所有学习进度和记录都将被删除。`)) {
                return;
            }

            try {
                // 删除项目
                await dbDelete('projects', projectId);

                // 删除相关的学习记录
                const records = await dbGetAll('records');
                const projectRecords = records.filter(r => r.projectId === projectId);
                for (const record of projectRecords) {
                    await dbDelete('records', record.id);
                }

                // 删除PDF文件（如果是上传的PDF）
                if (project.material.pdfFileId) {
                    // TODO: 如果有存储PDF文件，可以在这里删除
                }

                // 刷新项目列表
                await renderProjectList();

                // 显示成功消息
                alert('项目已删除');
            } catch (error) {
                console.error('删除项目失败:', error);
                alert('删除项目失败: ' + error.message);
            }

        async function selectPhase(phaseNum) {

            p.currentPhase = phaseNum;
            await dbUpdate('projects', p);

            // 从数据库重新获取最新的项目数据，确保读取到已保存的确认内容
            const refreshedProject = await dbGet('projects', p.id);
            if (refreshedProject) {
                currentProject = refreshedProject;
                const refreshedStep = currentProject.plan.steps[currentProject.currentStep - 1];

                // 加载已保存的确认内容

        // 重置Phase确认状态
        async function resetPhaseConfirmation(phaseNum) {
            const phaseKey = `phase${phaseNum}`;
            phaseConfirmedContents[phaseKey] = {
                confirmed: false,
                content: null,

            switch (phaseNum) {
                case 1: // 启动
                    return `

                case 4: // 费曼
                    return `

        // ==================== 辅助函数 ====================
        function parseAIResponse(content) {
            // 清理各种可能的markdown格式
            let cleaned = content.trim();

            // 移除 markdown 代码块标记 (包括 ```json 和 ```)
            cleaned = cleaned.replace(/```json\s*/gi, '');
            cleaned = cleaned.replace(/```\s*/gi, '');

            // 移除可能的额外空白
            cleaned = cleaned.trim();

            // 尝试直接解析
            try {
                return JSON.parse(cleaned);
            } catch (e) {
                // 如果直接解析失败，尝试提取JSON对象
                let firstBrace = cleaned.indexOf('{');
                let lastBrace = cleaned.lastIndexOf('}');

                // 如果有大括号，尝试提取
                if (firstBrace !== -1 && lastBrace !== -1 && lastBrace > firstBrace) {
                    let jsonStr = cleaned.substring(firstBrace, lastBrace + 1);

                    // 尝试修复未闭合的字符串（常见问题：响应被截断）
                    const openBraces = (jsonStr.match(/\{/g) || []).length;
                    const closeBraces = (jsonStr.match(/\}/g) || []).length;
                    const openBrackets = (jsonStr.match(/\[/g) || []).length;
                    const closeBrackets = (jsonStr.match(/\]/g) || []).length;

                    // 如果括号不匹配，尝试闭合
                    while (openBraces > closeBraces) {
                        jsonStr += '}';
                        closeBraces++;
                    }
                    while (openBrackets > closeBrackets) {
                        jsonStr += ']';
                        closeBrackets++;
                    }

                    // 如果字符串未闭合，尝试闭合
                    const lastQuoteIndex = jsonStr.lastIndexOf('"');
                    if (lastQuoteIndex > 0) {
                        const afterLastQuote = jsonStr.substring(lastQuoteIndex + 1);
                        // 检查是否有未转义的引号
                        let quoteCount = 0;
                        for (let i = 0; i < jsonStr.length; i++) {
                            if (jsonStr[i] === '"' && (i === 0 || jsonStr[i-1] !== '\\')) {
                                quoteCount++;
                            }
                        }
                        if (quoteCount % 2 !== 0) {
                            jsonStr += '"';
                        }
                    }

                    try {
                        const parsed = JSON.parse(jsonStr);
                        console.warn('JSON已自动修复');
                        return parsed;
                    } catch (e2) {
                        // 还失败，显示详细错误
                        const errorPos = e2.message.match(/position (\d+)/);
                        const pos = errorPos ? parseInt(errorPos[1]) : -1;
                        const preview = jsonStr.substring(Math.max(0, pos - 50), pos + 50);
                        console.error('JSON解析失败，位置:', pos, '预览:', preview);
                        throw new Error('AI 响应格式错误，可能是网络中断导致数据不完整。请重试。');
                    }
                }

                // 完全没有JSON结构
                console.error('AI响应中未找到JSON结构，内容前200字符:', cleaned.substring(0, 200));
                throw new Error('AI 响应格式错误，未找到有效的 JSON 数据');
            }
        }

        function renderQuestion(q, idx) {
            // 使用 idx 作为唯一标识符，确保与收集答案时一致
            const qid = idx + 1;
            console.log(`渲染题目 ${qid}:`, q);

                const letters = ['A', 'B', 'C', 'D', 'E', 'F'];
                const formattedOptions = q.options.map((opt, i) => {
                    const letter = letters[i] || String.fromCharCode(65 + i);
                    // 如果选项已经包含字母前缀（如 "A. xxx"），则直接使用
                    if (/^[A-Z][.\s]/.test(opt)) {
                        return { letter, value: letter, display: opt };
                    }
                    // 否则添加字母前缀
                    return { letter, value: letter, display: `${letter}. ${opt}` };
                });
                console.log(`  选项格式化后:`, formattedOptions);

                return `
                    <div class="bg-slate-900 rounded-lg p-4">
                        <p class="font-semibold mb-3">${idx + 1}. ${q.question}</p>
                        <div class="space-y-2">
                            ${formattedOptions.map(opt => `
                                <label class="flex items-center gap-2 cursor-pointer hover:bg-slate-800 p-2 rounded">
                                    <input type="radio" name="question_${qid}" value="${opt.value}" data-letter="${opt.letter}" class="w-4 h-4">
                                    <span>${opt.display}</span>
                                </label>
                            `).join('')}
                        </div>
                    </div>
                `;
            } else {
                return `
                    <div class="bg-slate-900 rounded-lg p-4">
                        <p class="font-semibold mb-2">${idx + 1}. ${q.question}</p>
                        <p class="text-xs text-slate-500 mb-2">${q.type === 'short' ? '简答题' : '应用题'}</p>
                        <textarea id="answer_${qid}" class="w-full h-24 bg-slate-700 border border-slate-600 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="写下你的答案..."></textarea>

        // ==================== 工具函数 ====================
        function renderMarkdown(text) {
            // 简单的 Markdown 渲染（不使用外部库）
            if (!text) return '';

            return text
                // 标题
                .replace(/^### (.*$)/gim, '<h3 class="text-lg font-bold mt-4 mb-2 text-indigo-400">$1</h3>')
                .replace(/^## (.*$)/gim, '<h2 class="text-xl font-bold mt-4 mb-2 text-indigo-300">$1</h2>')
                .replace(/^# (.*$)/gim, '<h1 class="text-2xl font-bold mt-4 mb-2 text-indigo-300">$1</h1>')
                // 粗体和斜体
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                // 列表
                .replace(/^\- (.*$)/gim, '<li class="ml-4">$1</li>')
                .replace(/^\d+\. (.*$)/gim, '<li class="ml-4 list-decimal">$1</li>')
                // 代码
                .replace(/`([^`]+)`/g, '<code class="bg-slate-800 px-1 rounded text-green-400">$1</code>')
                .replace(/```([^`]+)```/g, '<pre class="bg-slate-800 p-3 rounded my-2 overflow-x-auto"><code>$1</code></pre>')
                // 换行
                .replace(/\n\n/g, '<br><br>')
                .replace(/\n/g, '<br>');
        }

        // 渲染知识框架（用于显示）
        function renderFrameworkForDisplay(framework) {
            if (!framework) return '';
            if (typeof framework === 'string') return framework;

            // 如果是对象数组
            if (Array.isArray(framework)) {
                return framework.map((item, idx) => {
                    if (typeof item === 'string') return `<div class="mb-2">${idx + 1}. ${item}</div>`;
                    if (typeof item === 'object') {
                        const title = item.标题 || item.title || item.模块 || item.module || `部分 ${idx + 1}`;
                        const content = item.内容 || item.content || item.描述 || item.description || item.要点 || '';
                        let html = `<div class="mb-3">
                            <h4 class="font-semibold text-indigo-300">${title}</h4>`;
                        if (content) {
                            if (Array.isArray(content)) {
                                html += `<ul class="ml-4 list-disc text-slate-300">`;
                                content.forEach(c => html += `<li>${c}</li>`);
                                html += `</ul>`;
                            } else {
                                html += `<p class="text-slate-300">${content}</p>`;
                            }
                        }
                        html += `</div>`;
                        return html;
                    }
                    return `<div class="mb-2">${String(item)}</div>`;
                }).join('');
            }

            // 如果是对象，尝试提取结构信息
            if (typeof framework === 'object') {
                let html = '';
                Object.entries(framework).forEach(([key, value]) => {
                    html += `<div class="mb-2">
                        <span class="font-semibold text-indigo-300">${key}：</span>`;
                    if (Array.isArray(value)) {
                        html += `<span class="text-slate-300">${value.join('、')}</span>`;
                    } else {
                        html += `<span class="text-slate-300">${value}</span>`;
                    }
                    html += `</div>`;
                });
                return html;
            }

            return String(framework);
        }

        async function analyzeOriginalStructure() {
            const p = currentProject;
            const step = p.plan.steps[p.currentStep - 1];

            // 获取完整内容
            let fullContent = '';
            if (p.material.type === 'pdf') {
                fullContent = p.material.fullText || p.material.preview || '';
            } else {
                fullContent = p.material.content || p.material.preview || '';
            }

            const contentEl = document.getElementById('phaseActionArea');
            contentEl.innerHTML = '<p class="loading text-center py-8">📋 AI 正在分析原文结构...</p>';

            try {
                const response = await callModel(p.model, [{
                    role: 'user',
                    content: `请分析以下原文，生成忠实的层级大纲，帮助理解作者的思考逻辑和组织方式。

学习主题：${step.title}

原文内容：
${fullContent}

请按以下格式输出层级大纲（使用纯文本格式，不要JSON）：

# 主标题

## 一级分类 1
### 二级分类 1.1
- 要点1
- 要点2

### 二级分类 1.2
- 要点1

## 一级分类 2
...

要求：
1. 严格忠实于原文，不要添加原文没有的内容
2. 保持原文的逻辑顺序和组织结构
3. 用简洁的语言概括每部分的核心内容
4. 使用标准的层级大纲格式（# ## ### -）
5. 只输出大纲，不要有其他解释或说明文字
`
                }]);

                // 显示原文结构分析
                contentEl.innerHTML = `
                    <div class="space-y-4">
                        <div class="bg-slate-900 rounded-lg p-4">
                            <p class="text-amber-400 font-semibold mb-2">📋 原文结构分析</p>
                            <div class="text-slate-300 text-sm whitespace-pre-line leading-relaxed">${response.content.replace(/#/g, '<span class="text-indigo-400">#</span>').replace(/\n/g, '<br>')}</div>
                        </div>

                        <div class="flex gap-2">
                            <button onclick="selectPhase(1)" class="flex-1 px-6 py-3 bg-slate-700 hover:bg-slate-600 rounded-lg font-bold">← 上一步</button>
                            <button onclick="completePhaseSimple(2)" class="flex-1 px-6 py-3 bg-indigo-600 hover:bg-indigo-700 rounded-lg font-bold">已理解，下一步 →</button>
                        </div>
                    </div>
                `;

            } catch (error) {
                contentEl.innerHTML = `<p class="text-red-400">错误: ${error.message}</p>`;
            }
        }

        async function completePhase(phaseNum, result) {
            const p = currentProject;
            const step = p.plan.steps[p.currentStep - 1];

            // 更新阶段状态
            if (typeof result === 'string') {
                // 如果是字符串，包装成对象
                step.phases[phaseNum - 1].result = { summary: result };
            } else if (result === null || result === undefined) {
                // 如果没有传结果，使用存储的结果
                step.phases[phaseNum - 1].result = currentPhaseResult || { summary: '已完成' };
            } else {
                step.phases[phaseNum - 1].result = result;
            }
            step.phases[phaseNum - 1].completed = true;

            // 清除临时存储
            currentPhaseResult = null;

            // 更新项目时间
            p.updatedAt = new Date().toISOString();

            await dbUpdate('projects', p);

            // 刷新显示
            renderLearningView();

            // 自动进入下一阶段
            if (phaseNum < 7) {
                selectPhase(phaseNum + 1);
            } else {
                // 所有阶段完成，检查是否还有下一步骤
                checkStepCompletion();
            }
        }

        // 简化版本：只传递阶段号
        async function completePhaseSimple(phaseNum) {
            await completePhase(phaseNum, null);
        }

        async function checkStepCompletion() {
            const p = currentProject;
            const step = p.plan.steps[p.currentStep - 1];

            // 检查是否所有阶段都完成或跳过
            const allDone = step.phases.every(ph => ph.completed || ph.skipped);

            if (allDone) {
                step.completed = true;
                step.completedAt = new Date().toISOString();

                if (p.currentStep < p.plan.steps.length) {
                    // 有下一步骤
                    const contentEl = document.getElementById('phaseContent');
                    if (contentEl) {
                        contentEl.innerHTML = `
                            <div class="text-center py-8">
                                <div class="text-6xl mb-4">🎉</div>
                                <p class="text-xl font-semibold mb-2">恭喜！完成了本章所有学习步骤</p>
                                <p class="text-slate-400 mb-4">准备好进入下一章了吗？</p>
                                <button onclick="goToNextStep()" class="px-8 py-3 bg-indigo-600 hover:bg-indigo-700 rounded-lg font-bold">
                                    继续下一章 →
                                </button>
                            </div>
                        `;
                    }
                    await dbUpdate('projects', p);
                } else {
                    // 所有步骤完成
                    await dbUpdate('projects', p);
                    alert('🎊 恭喜！你完成了所有学习内容！');
                    backToMain();
                }
            }
        }

        async function goToNextStep() {
            const p = currentProject;
            p.currentStep++;
            p.currentPhase = 1;
            p.progress = (p.currentStep - 1) / p.plan.steps.length;
            p.updatedAt = new Date().toISOString();
            await dbUpdate('projects', p);
            renderLearningView();
        }

        async function skipPhase(phaseNum) {
            const p = currentProject;
            const step = p.plan.steps[p.currentStep - 1];
            step.phases[phaseNum - 1].skipped = true;
            await dbUpdate('projects', p);

            // 自动进入下一阶段
            if (phaseNum < 7) {
                selectPhase(phaseNum + 1);
            }
        }

        async function resetPhase(phaseNum) {
            const p = currentProject;
            const step = p.plan.steps[p.currentStep - 1];
            step.phases[phaseNum - 1].skipped = false;
            step.phases[phaseNum - 1].completed = false;
            step.phases[phaseNum - 1].result = null;
            await dbUpdate('projects', p);
            selectPhase(phaseNum);
        }

        function nextPhase() {
            const p = currentProject;
            if (p.currentPhase < 7) {
                selectPhase(p.currentPhase + 1);
            } else {
                // 当前步骤完成，进入下一步
                if (p.currentStep < p.plan.steps.length) {
                    p.currentStep++;
                    p.currentPhase = 1;
                    p.progress = (p.currentStep - 1) / p.plan.steps.length;
                    p.updatedAt = new Date().toISOString();
                    dbUpdate('projects', p).then(() => {
                        renderLearningView();
                    });
                } else {
                    // 所有步骤完成
                    alert('🎉 恭喜！你完成了所有学习步骤！');
                    backToMain();
                }
            }
        }

        function backToMain() {
            currentProject = null;
            document.getElementById('learningView').classList.add('hidden');
            document.getElementById('mainView').classList.remove('hidden');
            renderProjectList();
        }

        function exportNote() {
            const p = currentProject;
            const step = p.plan.steps[p.currentStep - 1];

            if (step.note) {
                // 下载 Markdown 文件
                const blob = new Blob([step.note], { type: 'text/markdown' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${p.title} - ${step.title}.md`;
                a.click();
                URL.revokeObjectURL(url);
            } else {
                alert('请先完成第7阶段（总结）来生成笔记');
            }
        }

        function updateChapterNote() {
            const p = currentProject;
            const step = p.plan.steps[p.currentStep - 1];
            const noteEl = document.getElementById('chapterNote');

            if (!noteEl) return;

            // 检查已完成的阶段
            const completedPhases = step.phases.filter(ph => ph.completed);
            const totalPhases = step.phases.length;

            if (completedPhases.length === 0) {
                noteEl.innerHTML = '<p class="text-slate-600 text-center py-4">开始学习后将显示进度</p>';
                return;
            }

            // 显示进度
            noteEl.innerHTML = `
                <div class="mb-3">
                    <div class="flex justify-between text-sm mb-1">
                        <span>进度</span>
                        <span>${completedPhases.length}/${totalPhases}</span>
                    </div>
                    <div class="w-full bg-slate-700 rounded-full h-2">
                        <div class="bg-indigo-600 h-2 rounded-full" style="width: ${(completedPhases.length / totalPhases) * 100}%"></div>
                    </div>
                </div>
                <div class="space-y-2 text-xs">
                    ${step.phases.map((ph, idx) => {
                        if (ph.completed) return `<p class="text-green-400">✅ ${['启动', '框架', '学习', '费曼', '考试', '应用', '总结'][idx]}</p>`;
                        if (ph.skipped) return `<p class="text-slate-600">⏭️ ${['启动', '框架', '学习', '费曼', '考试', '应用', '总结'][idx]}</p>`;
                        return `<p class="text-slate-700">○ ${['启动', '框架', '学习', '费曼', '考试', '应用', '总结'][idx]}</p>`;
                    }).join('')}
                </div>
                ${step.note ? `<p class="text-green-400 text-center mt-3">📝 笔记已生成</p>` : `<p class="text-slate-600 text-center mt-3">完成第7步生成笔记</p>`}
            `;
        }

        // ==================== 初始化 ====================
        async function init() {
            try {
                await initDB();
                await renderProjectList();
                await renderTodayLearning();
            } catch (error) {
                console.error('初始化失败:', error);
                alert('应用初始化失败，请刷新页面重试');
            }
        }

            // TODO: 实现今日学习统计
            const today = new Date().toDateString();
            // 计算今天的学习记录
            // 暂时显示默认内容
        }

        // 启动应用
        init();
    </script>
